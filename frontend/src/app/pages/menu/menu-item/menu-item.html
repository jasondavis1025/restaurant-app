<button type="button" class="menu-item" (click)="openDetails()">
  <div class="menu-item__body">
    @if (item().imageUrl) {
      <img [src]="item().imageUrl" [alt]="item().name" class="menu-item__image" />
    }

    <div class="menu-item__content">
      <div class="menu-item__heading">
        <h3 class="menu-item__name">{{ item().name }}</h3>
        <!-- <span class="menu-item__price">
          {{ item.basePrice | currency }}
        </span> -->
      </div>
    </div>
  </div>
  <div class="menu-item__overlay">
    @if (item().description) {
      {{ item().description }}
    }
  </div>
</button>
