<section class="menu">
  <div class="menu__tabs">
    <button
      class="menu__tab"
      type="button"
      [class.menu__tab--active]="activeMenu() === 'morning'"
      (click)="selectMenu('morning')"
    >
      <span class="menu__tab-title">{{ menuSections.morning.title }}</span>
      <span class="menu__tab-hours">7AM to 4PM</span>
    </button>
    <button
      class="menu__tab"
      type="button"
      [class.menu__tab--active]="activeMenu() === 'late-night'"
      (click)="selectMenu('late-night')"
    >
      <span class="menu__tab-title">{{ menuSections['late-night'].title }}</span>
      <span class="menu__tab-hours">7PM TO 12AM</span>
    </button>
  </div>

  @for (category of menuSections[activeMenu()].categories; track category.name) {
    <section class="menu__category">
      <h2>{{ category.name }}</h2>
      <div class="menu__items">
        @for (item of category.items; track item.id) {
          <article class="menu-item">
            @if (item.imageUrl) {
              <img [src]="item.imageUrl" alt="item.name" class="menu-item__image" />
            }

            <div class="menu-item__content">
              <div class="menu-item__heading">
                <h3 class="menu-item__name">{{ item.name }}</h3>
                <span class="menu-item__price"> {{ item.price | currency }}</span>
              </div>
              <p class="menu-item__description">
                {{ item.description }}
              </p>
            </div>
          </article>
        }
      </div>
    </section>
  }
</section>
