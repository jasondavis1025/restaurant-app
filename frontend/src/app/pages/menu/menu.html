<section class="menu">
  <div class="menu__tabs">
    <button
      class="menu__tab"
      type="button"
      [class.menu__tab--active]="activeMenu() === 'morning'"
      (click)="selectMenu('morning')"
    >
      <span class="menu__tab-title">MORNING CAFE MENU</span>
      <span class="menu__tab-hours">7AM to 4PM</span>
    </button>
    <button
      class="menu__tab"
      type="button"
      [class.menu__tab--active]="activeMenu() === 'late-night'"
      (click)="selectMenu('late-night')"
    >
      <span class="menu__tab-title">LATE NIGHT <MENU></MENU></span>
      <span class="menu__tab-hours">7PM TO 12AM</span>
    </button>
  </div>

  @if (loading()) {
    <p>Loading menu...</p>
  } @else if (error()) {
    <p>{{ error() }}</p>
  } @else if (activeMenuSection(); as menu) {
    @for (category of menu.categories; track category.id) {
      <section class="menu_category">
        <h2 class="menu__category-title">
          {{ category.name }}
        </h2>
        <div class="menu__items">
          @for (item of category.items; track item.id) {
            <app-menu-item [item]="item" />
          }
        </div>
      </section>
    }
  }
</section>
